<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>معرض الصور المحلي - Local Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }

        .stat-item {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Access Button */
        .access-section {
            text-align: center;
            margin: 40px 0;
        }

        .grant-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .grant-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Controls */
        .controls {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .control-btn:hover {
            background: #667eea;
            color: white;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .photo-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            cursor: pointer;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 15px;
            background: white;
        }

        .photo-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .photo-details {
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* Folder List */
        .folder-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .folder-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .folder-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .folder-tag {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .folder-tag:hover {
            background: #667eea;
            color: white;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .loading-subtext {
            color: #ccc;
            font-size: 16px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 90vh;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-close:hover {
            color: #ff4444;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .modal-nav-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-nav-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            background: white;
            border-radius: 10px;
            color: #999;
            font-size: 18px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .grant-btn {
                font-size: 20px;
                padding: 15px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📸 معرض الصور المحلي</h1>
            <p>جميع الصور من جهازك - معروضة محلياً فقط</p>
            <div class="stats-bar" id="stats">
                <div class="stat-item">🖼️ <span id="totalPhotos">0</span> صورة</div>
                <div class="stat-item">📁 <span id="totalFolders">0</span> مجلد</div>
                <div class="stat-item">💾 <span id="totalSize">0</span> MB</div>
            </div>
        </div>

        <!-- Access Button (يظهر أول ما تفتح الصفحة) -->
        <div class="access-section" id="accessSection">
            <button class="grant-btn" onclick="requestAccess()">
                📁 اضغط هنا للدخول لصورك
            </button>
            <p style="color: white; margin-top: 20px;">
                بعد الضغط، اختر المجلد الذي تريد عرض صوره
            </p>
        </div>

        <!-- المحتوى الرئيسي (يختفي لحين السماح) -->
        <div id="mainContent" style="display: none;">
            <!-- أزرار التحكم -->
            <div class="controls">
                <button class="control-btn" onclick="sortByName()">🔤 ترتيب حسب الاسم</button>
                <button class="control-btn" onclick="sortByDate()">📅 ترتيب حسب التاريخ</button>
                <button class="control-btn" onclick="sortBySize()">📊 ترتيب حسب الحجم</button>
                <button class="control-btn" onclick="refreshPhotos()">🔄 إعادة المسح</button>
            </div>

            <!-- قائمة المجلدات -->
            <div class="folder-section" id="folderSection">
                <div class="folder-title">📂 المجلدات التي تحتوي صور</div>
                <div class="folder-list" id="folderList">
                    <div style="color: #999;">سيتم عرض المجلدات بعد المسح...</div>
                </div>
            </div>

            <!-- شبكة الصور -->
            <div id="photoGrid" class="photo-grid">
                <!-- الصور حتظهر هنا -->
            </div>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">جاري مسح الجهاز...</div>
        <div class="loading-subtext" id="loadingSubtext">يتم البحث عن جميع الصور</div>
    </div>

    <!-- نافذة عرض الصور -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="" alt="">
            <div class="modal-nav">
                <button class="modal-nav-btn" onclick="prevImage()">←</button>
                <button class="modal-nav-btn" onclick="nextImage()">→</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== المتغيرات العامة ====================
        let directoryHandle = null;
        let allPhotos = [];
        let currentPhotos = [];
        let currentIndex = 0;

        // ==================== طلب الدخول للملفات ====================
        async function requestAccess() {
            try {
                // طلب الوصول للمجلد
                directoryHandle = await window.showDirectoryPicker();
                
                // إخفاء زر الوصول وإظهار المحتوى
                document.getElementById('accessSection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                // بدأ المسح
                await scanAllPhotos();
                
            } catch (error) {
                alert('خطأ: ' + error.message);
                console.error(error);
            }
        }

        // ==================== مسح جميع الصور ====================
        async function scanAllPhotos() {
            if (!directoryHandle) return;
            
            // إظهار شاشة التحميل
            showLoading('جاري مسح الجهاز...', 'يتم البحث عن جميع الصور');
            
            allPhotos = [];
            let folders = new Set();
            
            async function scanDir(dirHandle, path = '') {
                try {
                    for await (const entry of dirHandle.values()) {
                        if (entry.kind === 'directory') {
                            // هذا مجلد - نضيفه للقائمة
                            folders.add(path + '/' + entry.name);
                            // نستمر في المسح داخل المجلد
                            await scanDir(entry, path + '/' + entry.name);
                        } else {
                            // هذا ملف - نتحقق إذا كان صورة
                            const ext = entry.name.split('.').pop().toLowerCase();
                            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp'];
                            
                            if (imageExts.includes(ext)) {
                                try {
                                    const file = await entry.getFile();
                                    
                                    // إضافة الصورة للقائمة
                                    allPhotos.push({
                                        name: entry.name,
                                        path: path + '/' + entry.name,
                                        folder: path || '/',
                                        size: file.size,
                                        lastModified: file.lastModified,
                                        file: file,
                                        handle: entry,
                                        url: null
                                    });
                                    
                                    // تحديث العداد
                                    updateLoadingProgress(allPhotos.length);
                                    
                                } catch (e) {
                                    console.log('خطأ في قراءة الملف:', entry.name);
                                }
                            }
                        }
                    }
                } catch (e) {
                    console.log('خطأ في المجلد:', path);
                }
            }
            
            // بدأ المسح
            await scanDir(directoryHandle);
            
            // ترتيب الصور (الأحدث أولاً)
            allPhotos.sort((a, b) => b.lastModified - a.lastModified);
            currentPhotos = [...allPhotos];
            
            // تحديث الإحصائيات
            updateStats();
            
            // عرض المجلدات
            displayFolders(Array.from(folders));
            
            // عرض الصور
            displayPhotos(currentPhotos);
            
            // إخفاء شاشة التحميل
            hideLoading();
        }

        // ==================== عرض الصور ====================
        function displayPhotos(photos) {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            
            if (photos.length === 0) {
                grid.innerHTML = '<div class="empty-state">لا توجد صور في هذا المجلد</div>';
                return;
            }
            
            photos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.onclick = () => openModal(index);
                
                // إنشاء رابط مؤقت للصورة
                if (photo.file && !photo.url) {
                    photo.url = URL.createObjectURL(photo.file);
                }
                
                // حجم الصورة بالميجابايت
                const sizeMB = (photo.size / (1024 * 1024)).toFixed(2);
                
                // تاريخ التعديل
                const date = new Date(photo.lastModified).toLocaleDateString('ar-EG');
                
                card.innerHTML = `
                    <img src="${photo.url || ''}" alt="${photo.name}" loading="lazy">
                    <div class="photo-info">
                        <div class="photo-name">${photo.name}</div>
                        <div class="photo-details">
                            <span>${sizeMB} MB</span>
                            <span>${date}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // ==================== عرض المجلدات ====================
        function displayFolders(folders) {
            const folderList = document.getElementById('folderList');
            folderList.innerHTML = '';
            
            // زر "الكل"
            const allBtn = document.createElement('span');
            allBtn.className = 'folder-tag';
            allBtn.textContent = '📁 الكل';
            allBtn.onclick = () => {
                currentPhotos = [...allPhotos];
                displayPhotos(currentPhotos);
            };
            folderList.appendChild(allBtn);
            
            // عرض المجلدات
            folders.sort().forEach(folder => {
                if (folder.trim() === '') return;
                
                const btn = document.createElement('span');
                btn.className = 'folder-tag';
                
                // اسم المجلد فقط (بدون المسار الكامل)
                const folderName = folder.split('/').pop() || folder;
                btn.textContent = `📁 ${folderName}`;
                
                btn.onclick = () => {
                    const filtered = allPhotos.filter(p => p.folder === folder);
                    currentPhotos = filtered;
                    displayPhotos(filtered);
                };
                
                folderList.appendChild(btn);
            });
            
            document.getElementById('totalFolders').textContent = folders.length;
        }

        // ==================== تحديث الإحصائيات ====================
        function updateStats() {
            document.getElementById('totalPhotos').textContent = allPhotos.length;
            
            const totalBytes = allPhotos.reduce((sum, p) => sum + p.size, 0);
            const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
            document.getElementById('totalSize').textContent = totalMB;
        }

        // ==================== وظائف الترتيب ====================
        function sortByName() {
            currentPhotos.sort((a, b) => a.name.localeCompare(b.name));
            displayPhotos(currentPhotos);
        }
        
        function sortByDate() {
            currentPhotos.sort((a, b) => b.lastModified - a.lastModified);
            displayPhotos(currentPhotos);
        }
        
        function sortBySize() {
            currentPhotos.sort((a, b) => b.size - a.size);
            displayPhotos(currentPhotos);
        }
        
        async function refreshPhotos() {
            await scanAllPhotos();
        }

        // ==================== شاشة التحميل ====================
        function showLoading(text, subtext) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').textContent = text || 'جاري التحميل...';
            document.getElementById('loadingSubtext').textContent = subtext || 'الرجاء الانتظار';
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        
        function updateLoadingProgress(count) {
            document.getElementById('loadingSubtext').textContent = `تم العثور على ${count} صورة`;
        }

        // ==================== نافذة عرض الصور ====================
        function openModal(index) {
            currentIndex = index;
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            
            // تحميل الصورة
            if (currentPhotos[currentIndex].url) {
                modalImg.src = currentPhotos[currentIndex].url;
            } else if (currentPhotos[currentIndex].file) {
                const url = URL.createObjectURL(currentPhotos[currentIndex].file);
                currentPhotos[currentIndex].url = url;
                modalImg.src = url;
            }
            
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
        
        function prevImage() {
            if (currentIndex > 0) {
                currentIndex--;
                updateModalImage();
            }
        }
        
        function nextImage() {
            if (currentIndex < currentPhotos.length - 1) {
                currentIndex++;
                updateModalImage();
            }
        }
        
        function updateModalImage() {
            const modalImg = document.getElementById('modalImage');
            
            if (currentPhotos[currentIndex].url) {
                modalImg.src = currentPhotos[currentIndex].url;
            } else if (currentPhotos[currentIndex].file) {
                const url = URL.createObjectURL(currentPhotos[currentIndex].file);
                currentPhotos[currentIndex].url = url;
                modalImg.src = url;
            }
        }

        // ==================== تنظيف الذاكرة عند الإغلاق ====================
        window.addEventListener('beforeunload', function() {
            // مسح الروابط المؤقتة
            allPhotos.forEach(photo => {
                if (photo.url) {
                    URL.revokeObjectURL(photo.url);
                }
            });
        });

        // ==================== التحكم بلوحة المفاتيح ====================
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('imageModal');
            if (modal.style.display === 'flex') {
                if (e.key === 'ArrowLeft') {
                    prevImage();
                } else if (e.key === 'ArrowRight') {
                    nextImage();
                } else if (e.key === 'Escape') {
                    closeModal();
                }
            }
        });
    </script>
</body>
</html>
