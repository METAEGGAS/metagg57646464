<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Photo Viewer - Real Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: white;
            padding: 20px;
        }

        /* شاشة الدخول */
        #accessScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .access-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .access-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 50px;
            margin: 30px 0;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .access-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        /* شريط التحميل */
        #loadingBar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            z-index: 9999;
            display: none;
        }

        /* معرض الصور */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .photo-card:hover {
            transform: scale(1.05);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102,126,234,0.3);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #2a2a2a;
        }

        .photo-info {
            padding: 15px;
        }

        .photo-name {
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .photo-size {
            color: #888;
            font-size: 12px;
        }

        /* نافذة عرض الصور */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 90vh;
            border: 3px solid #667eea;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-close:hover {
            color: #667eea;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: #667eea;
        }

        .prev { left: 20px; }
        .next { right: 20px; }

        /* إحصائيات */
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 10px;
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="accessScreen">
        <div class="access-box">
            <h1>📸 Photo Viewer</h1>
            <p style="color: #666; margin: 20px;">اضغط للسماح بدخول معرض الصور</p>
            <button class="access-btn" onclick="requestAccess()">GRANT ACCESS</button>
            <p style="color: #999; font-size: 12px;">سيتم عرض جميع الصور من المجلد الذي تختاره</p>
        </div>
    </div>

    <!-- شريط التحميل -->
    <div id="loadingBar"></div>

    <!-- المحتوى الرئيسي -->
    <div id="mainContent" style="display: none;">
        <!-- الترويسة -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="color: #667eea;">🖼️ معرض الصور</h1>
            <button onclick="rescan()" style="background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px 20px; border-radius: 5px; cursor: pointer;">🔄 إعادة مسح</button>
        </div>

        <!-- الإحصائيات -->
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalPhotos">0</div>
                <div class="stat-label">صورة</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalSize">0</div>
                <div class="stat-label">MB</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="loadTime">0</div>
                <div class="stat-label">ثانية</div>
            </div>
        </div>

        <!-- معرض الصور -->
        <div class="gallery" id="gallery"></div>
    </div>

    <!-- نافذة عرض الصور -->
    <div class="modal" id="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <button class="nav-btn prev" onclick="changeImage(-1)">←</button>
        <button class="nav-btn next" onclick="changeImage(1)">→</button>
        <div class="modal-content">
            <img id="modalImage" src="">
        </div>
    </div>

    <script>
        // المتغيرات العامة
        let dirHandle = null;
        let allPhotos = [];
        let currentPhotos = [];
        let currentIndex = 0;
        let startTime = 0;

        // طلب الوصول
        async function requestAccess() {
            try {
                dirHandle = await window.showDirectoryPicker();
                
                document.getElementById('accessScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                await scanAllPhotos();
                
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        }

        // مسح جميع الصور
        async function scanAllPhotos() {
            startTime = Date.now();
            showLoading(true);
            
            allPhotos = [];
            
            async function scanDir(handle, path = '') {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        // التحقق من امتداد الصورة
                        const ext = entry.name.split('.').pop().toLowerCase();
                        const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'heic'];
                        
                        if (imageExts.includes(ext)) {
                            try {
                                const file = await entry.getFile();
                                
                                // إنشاء URL للصورة
                                const url = URL.createObjectURL(file);
                                
                                allPhotos.push({
                                    name: entry.name,
                                    path: path + '/' + entry.name,
                                    size: file.size,
                                    lastModified: file.lastModified,
                                    file: file,
                                    url: url
                                });
                                
                                // تحديث الواجهة تدريجياً
                                if (allPhotos.length % 5 === 0) {
                                    displayPhotos([...allPhotos]);
                                }
                                
                            } catch (e) {
                                console.log('خطأ في قراءة:', entry.name);
                            }
                        }
                    } else if (entry.kind === 'directory') {
                        await scanDir(entry, path + '/' + entry.name);
                    }
                }
            }
            
            await scanDir(dirHandle);
            
            // عرض جميع الصور
            currentPhotos = [...allPhotos];
            displayPhotos(currentPhotos);
            updateStats();
            
            showLoading(false);
        }

        // عرض الصور
        function displayPhotos(photos) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            if (photos.length === 0) {
                gallery.innerHTML = '<div style="text-align: center; padding: 100px; color: #888;">لا توجد صور</div>';
                return;
            }
            
            photos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.onclick = () => openModal(index);
                
                // حجم الصورة بالميجابايت
                const sizeMB = (photo.size / (1024 * 1024)).toFixed(2);
                
                card.innerHTML = `
                    <img src="${photo.url}" alt="${photo.name}" loading="lazy">
                    <div class="photo-info">
                        <div class="photo-name">${photo.name}</div>
                        <div class="photo-size">${sizeMB} MB</div>
                    </div>
                `;
                
                gallery.appendChild(card);
            });
        }

        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('totalPhotos').textContent = allPhotos.length;
            
            const totalBytes = allPhotos.reduce((sum, p) => sum + p.size, 0);
            const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
            document.getElementById('totalSize').textContent = totalMB;
            
            const time = ((Date.now() - startTime) / 1000).toFixed(1);
            document.getElementById('loadTime').textContent = time;
        }

        // فتح نافذة الصورة
        function openModal(index) {
            currentIndex = index;
            document.getElementById('modalImage').src = currentPhotos[currentIndex].url;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function changeImage(direction) {
            currentIndex += direction;
            
            if (currentIndex < 0) {
                currentIndex = currentPhotos.length - 1;
            } else if (currentIndex >= currentPhotos.length) {
                currentIndex = 0;
            }
            
            document.getElementById('modalImage').src = currentPhotos[currentIndex].url;
        }

        // إعادة المسح
        async function rescan() {
            // تنظيف URLs القديمة
            allPhotos.forEach(photo => {
                if (photo.url) URL.revokeObjectURL(photo.url);
            });
            
            await scanAllPhotos();
        }

        // إظهار/إخفاء شريط التحميل
        function showLoading(show) {
            const bar = document.getElementById('loadingBar');
            if (show) {
                bar.style.display = 'block';
                let width = 0;
                const interval = setInterval(() => {
                    if (width >= 100) {
                        clearInterval(interval);
                    } else {
                        width++;
                        bar.style.width = width + '%';
                    }
                }, 100);
            } else {
                bar.style.width = '100%';
                setTimeout(() => {
                    bar.style.display = 'none';
                    bar.style.width = '0%';
                }, 500);
            }
        }

        // التنظيف عند الإغلاق
        window.addEventListener('beforeunload', () => {
            allPhotos.forEach(photo => {
                if (photo.url) URL.revokeObjectURL(photo.url);
            });
        });

        // التنقل بالكيبورد
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal').style.display === 'flex') {
                if (e.key === 'ArrowLeft') changeImage(-1);
                else if (e.key === 'ArrowRight') changeImage(1);
                else if (e.key === 'Escape') closeModal();
            }
        });

    </script>
</body>
</html>
