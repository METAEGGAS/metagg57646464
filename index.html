<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>File System Explorer - Real Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', monospace;
        }
        
        body {
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
        }

        /* شاشة الدخول */
        #accessScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .access-box {
            background: #111;
            border: 2px solid #00ff00;
            padding: 50px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 0 50px #00ff0033;
        }

        .access-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 30px;
            font-weight: bold;
            border-radius: 50px;
            margin: 30px 0;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 50px #00ff00; }
        }

        /* شريط الإحصائيات */
        .stats-bar {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
        }

        /* شريط المجلدات */
        .path-bar {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .path-item {
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #333;
            font-size: 14px;
        }

        .path-item:hover {
            background: #00ff00;
            color: #000;
        }

        /* عرض الملفات */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .file-card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-card:hover {
            border-color: #00ff00;
            transform: translateY(-5px);
        }

        .file-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 10px;
        }

        .file-name {
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            color: #888;
            font-size: 12px;
        }

        .file-date {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }

        /* عرض البيانات التفصيلية */
        .data-panel {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            margin-top: 20px;
        }

        .data-row {
            display: flex;
            border-bottom: 1px solid #333;
            padding: 10px 0;
        }

        .data-label {
            width: 150px;
            color: #888;
        }

        .data-value {
            flex: 1;
            color: #00ff00;
            word-break: break-all;
        }

        /* شاشة التحميل */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        .loading-box {
            text-align: center;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid #333;
            border-top-color: #00ff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* نافذة عرض الصور */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 30000;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
            border: 2px solid #00ff00;
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="accessScreen">
        <div class="access-box">
            <h1>📁 FILE SYSTEM EXPLORER</h1>
            <p style="color: #888; margin: 20px;">الوصول الحقيقي لملفات جهازك</p>
            <button class="access-btn" onclick="requestAccess()">GRANT ACCESS</button>
            <p style="color: #444; font-size: 12px;">سيتم قراءة جميع الملفات وعرض بياناتها الحقيقية</p>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div id="loadingOverlay">
        <div class="loading-box">
            <div class="loading-spinner"></div>
            <h2 id="loadingStatus">جاري قراءة الملفات...</h2>
            <p id="loadingDetails">تم العثور على 0 ملف</p>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="mainContent" style="display: none;">
        <!-- الإحصائيات -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">إجمالي الملفات</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalFolders">0</div>
                <div class="stat-label">المجلدات</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalSize">0</div>
                <div class="stat-label">الحجم الكلي</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalImages">0</div>
                <div class="stat-label">الصور</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalDocs">0</div>
                <div class="stat-label">مستندات</div>
            </div>
        </div>

        <!-- شريط المسار -->
        <div class="path-bar" id="pathBar">
            <span class="path-item" onclick="loadRoot()">📁 الجذر</span>
        </div>

        <!-- أزرار التحكم -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="path-item" onclick="sortByName()">🔤 ترتيب بالاسم</button>
            <button class="path-item" onclick="sortBySize()">📊 ترتيب بالحجم</button>
            <button class="path-item" onclick="sortByDate()">📅 ترتيب بالتاريخ</button>
            <button class="path-item" onclick="showOnlyImages()">🖼️ الصور فقط</button>
            <button class="path-item" onclick="showAll()">📁 الكل</button>
        </div>

        <!-- عرض الملفات -->
        <div id="fileContainer"></div>

        <!-- لوحة البيانات التفصيلية -->
        <div class="data-panel" id="dataPanel" style="display: none;">
            <h3 style="margin-bottom: 20px;">📋 البيانات التفصيلية</h3>
            <div id="fileData"></div>
        </div>
    </div>

    <!-- نافذة عرض الصور -->
    <div class="modal" id="imageModal" onclick="this.style.display='none'">
        <div class="modal-content">
            <img id="modalImage" src="">
        </div>
    </div>

    <script>
        // ==================== المتغيرات الحقيقية ====================
        let rootHandle = null;
        let allFiles = [];
        let currentFiles = [];
        let currentPath = [];
        let totalSize = 0;
        let imageCount = 0;
        let docCount = 0;

        // ==================== طلب الوصول الحقيقي ====================
        async function requestAccess() {
            try {
                // طلب الوصول للمجلد
                rootHandle = await window.showDirectoryPicker();
                
                // إخفاء شاشة الدخول
                document.getElementById('accessScreen').style.display = 'none';
                
                // إظهار المحتوى
                document.getElementById('mainContent').style.display = 'block';
                
                // بدأ القراءة الحقيقية
                await scanDirectory(rootHandle, '');
                
            } catch (error) {
                alert('خطأ في الوصول: ' + error.message);
            }
        }

        // ==================== مسح حقيقي للمجلد ====================
        async function scanDirectory(dirHandle, path) {
            // إظهار شاشة التحميل
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            let filesInDir = [];
            
            try {
                for await (const entry of dirHandle.values()) {
                    const fullPath = path ? `${path}/${entry.name}` : entry.name;
                    
                    if (entry.kind === 'directory') {
                        // هذا مجلد - نضيفه للقائمة
                        filesInDir.push({
                            name: entry.name,
                            path: fullPath,
                            type: 'folder',
                            handle: entry,
                            size: 0,
                            lastModified: Date.now()
                        });
                        
                        // نقرأ محتوى المجلد (اختياري - نعلقها مؤقتاً عشان ما تعلق)
                        // await scanDirectory(entry, fullPath);
                        
                    } else {
                        // هذا ملف - نقرأ بياناته الحقيقية
                        try {
                            const file = await entry.getFile();
                            
                            // قراءة البيانات الحقيقية
                            const fileData = {
                                name: entry.name,
                                path: fullPath,
                                type: file.type,
                                size: file.size,
                                lastModified: file.lastModified,
                                handle: entry,
                                file: file,
                                extension: entry.name.split('.').pop().toLowerCase()
                            };
                            
                            filesInDir.push(fileData);
                            allFiles.push(fileData);
                            
                            // تحديث الإحصائيات
                            totalSize += file.size;
                            
                            if (file.type.startsWith('image/')) {
                                imageCount++;
                            } else if (file.type.includes('pdf') || file.type.includes('document')) {
                                docCount++;
                            }
                            
                            // تحديث شاشة التحميل
                            document.getElementById('loadingDetails').innerHTML = 
                                `تم العثور على ${allFiles.length} ملف<br>` +
                                `الحجم: ${(totalSize / (1024*1024)).toFixed(2)} MB`;
                            
                        } catch (e) {
                            console.log('لا يمكن قراءة الملف:', entry.name);
                        }
                    }
                }
            } catch (e) {
                console.log('خطأ في المجلد:', path);
            }
            
            // تحديث الواجهة
            currentFiles = filesInDir;
            currentPath = path ? path.split('/') : [];
            
            displayFiles(filesInDir);
            updateStats();
            updatePathBar();
            
            // إخفاء شاشة التحميل
            document.getElementById('loadingOverlay').style.display = 'none';
            
            return filesInDir;
        }

        // ==================== عرض الملفات ====================
        function displayFiles(files) {
            const container = document.getElementById('fileContainer');
            container.innerHTML = '';
            container.className = 'file-grid';
            
            if (files.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px;">المجلد فارغ</div>';
                return;
            }
            
            files.sort((a, b) => {
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                return a.name.localeCompare(b.name);
            });
            
            files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'file-card';
                
                // اختيار الأيقونة حسب نوع الملف
                let icon = '📄';
                if (file.type === 'folder') icon = '📁';
                else if (file.type.startsWith('image/')) icon = '🖼️';
                else if (file.type.includes('pdf')) icon = '📕';
                else if (file.type.includes('video')) icon = '🎥';
                else if (file.type.includes('audio')) icon = '🎵';
                
                // حجم الملف
                const size = file.size ? formatBytes(file.size) : '';
                
                // التاريخ
                const date = file.lastModified ? new Date(file.lastModified).toLocaleString() : '';
                
                card.innerHTML = `
                    <div class="file-icon">${icon}</div>
                    <div class="file-name">${file.name}</div>
                    <div class="file-size">${size}</div>
                    <div class="file-date">${date}</div>
                `;
                
                if (file.type === 'folder') {
                    card.onclick = () => openFolder(file.handle, file.path);
                } else {
                    card.onclick = () => showFileDetails(file);
                }
                
                container.appendChild(card);
            });
        }

        // ==================== فتح مجلد ====================
        async function openFolder(folderHandle, path) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingStatus').innerHTML = 'جاري فتح المجلد...';
            
            const files = [];
            
            for await (const entry of folderHandle.values()) {
                if (entry.kind === 'directory') {
                    files.push({
                        name: entry.name,
                        path: `${path}/${entry.name}`,
                        type: 'folder',
                        handle: entry,
                        size: 0,
                        lastModified: Date.now()
                    });
                } else {
                    try {
                        const file = await entry.getFile();
                        files.push({
                            name: entry.name,
                            path: `${path}/${entry.name}`,
                            type: file.type,
                            size: file.size,
                            lastModified: file.lastModified,
                            handle: entry,
                            file: file,
                            extension: entry.name.split('.').pop().toLowerCase()
                        });
                    } catch (e) {}
                }
            }
            
            currentFiles = files;
            currentPath = path.split('/');
            
            displayFiles(files);
            updatePathBar();
            
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ==================== عرض تفاصيل الملف ====================
        async function showFileDetails(file) {
            document.getElementById('dataPanel').style.display = 'block';
            
            let details = `
                <div class="data-row">
                    <div class="data-label">الاسم</div>
                    <div class="data-value">${file.name}</div>
                </div>
                <div class="data-row">
                    <div class="data-label">المسار</div>
                    <div class="data-value">${file.path}</div>
                </div>
                <div class="data-row">
                    <div class="data-label">الحجم</div>
                    <div class="data-value">${formatBytes(file.size)}</div>
                </div>
                <div class="data-row">
                    <div class="data-label">النوع</div>
                    <div class="data-value">${file.type || 'غير معروف'}</div>
                </div>
                <div class="data-row">
                    <div class="data-label">آخر تعديل</div>
                    <div class="data-value">${new Date(file.lastModified).toLocaleString()}</div>
                </div>
            `;
            
            // إذا كانت الصورة، نعرضها
            if (file.type && file.type.startsWith('image/')) {
                try {
                    const blob = await file.handle.getFile();
                    const url = URL.createObjectURL(blob);
                    
                    details += `
                        <div class="data-row">
                            <div class="data-label">معاينة</div>
                            <div class="data-value">
                                <img src="${url}" style="max-width: 100%; max-height: 300px;" onclick="openImageModal('${url}')">
                            </div>
                        </div>
                    `;
                } catch (e) {}
            }
            
            document.getElementById('fileData').innerHTML = details;
        }

        // ==================== تحديث الإحصائيات ====================
        function updateStats() {
            document.getElementById('totalFiles').innerHTML = allFiles.length;
            document.getElementById('totalFolders').innerHTML = '?'; // نحتاج نحسبها
            document.getElementById('totalSize').innerHTML = formatBytes(totalSize);
            document.getElementById('totalImages').innerHTML = imageCount;
            document.getElementById('totalDocs').innerHTML = docCount;
        }

        // ==================== تحديث شريط المسار ====================
        function updatePathBar() {
            const bar = document.getElementById('pathBar');
            bar.innerHTML = '<span class="path-item" onclick="loadRoot()">📁 الجذر</span>';
            
            let path = '';
            currentPath.forEach((part, index) => {
                if (part) {
                    path += (path ? '/' : '') + part;
                    const pathItem = document.createElement('span');
                    pathItem.className = 'path-item';
                    pathItem.textContent = `📂 ${part}`;
                    pathItem.onclick = () => navigateToPath(path);
                    bar.appendChild(pathItem);
                }
            });
        }

        // ==================== وظائف مساعدة ====================
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function sortByName() {
            const sorted = [...currentFiles].sort((a, b) => a.name.localeCompare(b.name));
            displayFiles(sorted);
        }

        function sortBySize() {
            const sorted = [...currentFiles].sort((a, b) => (b.size || 0) - (a.size || 0));
            displayFiles(sorted);
        }

        function sortByDate() {
            const sorted = [...currentFiles].sort((a, b) => (b.lastModified || 0) - (a.lastModified || 0));
            displayFiles(sorted);
        }

        function showOnlyImages() {
            const images = currentFiles.filter(f => f.type && f.type.startsWith('image/'));
            displayFiles(images);
        }

        function showAll() {
            displayFiles(currentFiles);
        }

        function loadRoot() {
            if (rootHandle) {
                openFolder(rootHandle, '');
            }
        }

        function openImageModal(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').style.display = 'flex';
        }

        // تنظيف الذاكرة
        window.addEventListener('beforeunload', () => {
            allFiles.forEach(f => {
                if (f.url) URL.revokeObjectURL(f.url);
            });
        });

    </script>
</body>
</html>
