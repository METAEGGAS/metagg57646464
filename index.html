<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Photo Viewer - Local Only</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #1a1a1a;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        /* زر السماح - يظهر مرة واحدة */
        .access-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }

        .access-box {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 2px solid #00ff88;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,255,136,0.3);
            max-width: 500px;
            width: 90%;
        }

        .access-box h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.5);
        }

        .access-box p {
            color: #aaa;
            margin: 20px 0;
            font-size: 18px;
        }

        .access-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin: 30px 0;
            transition: 0.3s;
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
        }

        .access-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0,255,136,0.8);
        }

        /* ترويسة الموقع */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .stats {
            display: flex;
            gap: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
        }

        .stat-label {
            color: #aaa;
            font-size: 14px;
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn:hover {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        /* قائمة المجلدات */
        .folders-bar {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #444;
            overflow-x: auto;
            white-space: nowrap;
        }

        .folder-tag {
            display: inline-block;
            background: #3a3a3a;
            padding: 8px 20px;
            border-radius: 30px;
            margin: 0 5px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #555;
        }

        .folder-tag:hover {
            background: #00ff88;
            color: #000;
        }

        /* شبكة الصور */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .photo-card {
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #444;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-card:hover {
            transform: translateY(-10px);
            border-color: #00ff88;
            box-shadow: 0 10px 30px rgba(0,255,136,0.2);
        }

        .photo-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 10px;
        }

        .photo-name {
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .photo-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #888;
        }

        /* شاشة التحميل الخفية */
        .scanning-indicator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00ff88;
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
            z-index: 9999;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* نافذة عرض الصور */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 90vh;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .modal-nav button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-nav button:hover {
            background: #00ff88;
            color: #000;
        }
    </style>
</head>
<body>

    <!-- طبقة السماح - تظهر مرة واحدة فقط -->
    <div class="access-overlay" id="accessOverlay">
        <div class="access-box">
            <h1>📸</h1>
            <h1>معرض الصور</h1>
            <p>هذه الأداة ستصل لصورك وتعرضها محلياً فقط</p>
            <p style="font-size: 14px; color: #666;">لا يتم رفع أي شيء للإنترنت</p>
            <button class="access-btn" onclick="requestFileAccess()">
                اضغط للسماح
            </button>
            <p style="font-size: 12px; color: #444;">بعد الضغط، اختر المجلد الذي تريد عرض صوره</p>
        </div>
    </div>

    <!-- مؤشر المسح الخفي (يظهر وقت المسح) -->
    <div class="scanning-indicator" id="scanningIndicator">
        <div class="spinner"></div>
        <span>جاري مسح الصور: <span id="scanCount">0</span></span>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="mainContent" style="display: none;">
        <!-- الترويسة -->
        <div class="header">
            <h2 style="color: #00ff88;">🖼️ معرض الصور</h2>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="totalPhotos">0</div>
                    <div class="stat-label">صورة</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalFolders">0</div>
                    <div class="stat-label">مجلد</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalSize">0</div>
                    <div class="stat-label">MB</div>
                </div>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="controls">
            <button class="btn" onclick="sortByDate()">📅 الأحدث</button>
            <button class="btn" onclick="sortByName()">🔤 الاسم</button>
            <button class="btn" onclick="sortBySize()">📊 الحجم</button>
            <button class="btn" onclick="rescan()">🔄 إعادة مسح</button>
        </div>

        <!-- المجلدات -->
        <div class="folders-bar" id="foldersBar">
            <span class="folder-tag" onclick="showAllPhotos()">📁 الكل</span>
        </div>

        <!-- شبكة الصور -->
        <div id="photoGrid" class="photo-grid"></div>
    </div>

    <!-- نافذة عرض الصور -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="">
            <div class="modal-nav">
                <button onclick="prevImage()">←</button>
                <button onclick="nextImage()">→</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== المتغيرات ====================
        let dirHandle = null;
        let allPhotos = [];
        let currentPhotos = [];
        let currentIndex = 0;
        let folders = new Set();

        // ==================== طلب السماح مرة واحدة ====================
        async function requestFileAccess() {
            try {
                // طلب الوصول للملفات
                dirHandle = await window.showDirectoryPicker();
                
                // إخفاء طبقة السماح
                document.getElementById('accessOverlay').style.display = 'none';
                
                // إظهار المحتوى الرئيسي
                document.getElementById('mainContent').style.display = 'block';
                
                // بدأ المسح الخفي
                await scanAllPhotos();
                
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        }

        // ==================== المسح الخفي ====================
        async function scanAllPhotos() {
            if (!dirHandle) return;
            
            // إظهار مؤشر المسح
            document.getElementById('scanningIndicator').style.display = 'flex';
            
            allPhotos = [];
            folders.clear();
            
            async function scanDir(handle, path = '') {
                try {
                    for await (const entry of handle.values()) {
                        if (entry.kind === 'directory') {
                            // تسجيل المجلد
                            folders.add(path || 'الرئيسي');
                            await scanDir(entry, entry.name);
                        } else {
                            // فحص إذا كان صورة
                            const ext = entry.name.split('.').pop().toLowerCase();
                            const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'bmp', 'webp', 'heic'];
                            
                            if (imgExts.includes(ext)) {
                                try {
                                    const file = await entry.getFile();
                                    
                                    allPhotos.push({
                                        name: entry.name,
                                        path: path + '/' + entry.name,
                                        folder: path || 'الرئيسي',
                                        size: file.size,
                                        lastModified: file.lastModified,
                                        file: file,
                                        url: URL.createObjectURL(file) // رابط مباشر للصورة
                                    });
                                    
                                    // تحديث العداد
                                    document.getElementById('scanCount').textContent = allPhotos.length;
                                    
                                } catch (e) {
                                    // تخطي الملفات التي لا يمكن قراءتها
                                }
                            }
                        }
                    }
                } catch (e) {
                    // تخطي المجلدات المحمية
                }
            }
            
            // بدأ المسح
            await scanDir(dirHandle);
            
            // ترتيب حسب التاريخ (الأحدث أولاً)
            allPhotos.sort((a, b) => b.lastModified - a.lastModified);
            currentPhotos = [...allPhotos];
            
            // تحديث الواجهة
            updateStats();
            updateFolders();
            displayPhotos(currentPhotos);
            
            // إخفاء مؤشر المسح
            document.getElementById('scanningIndicator').style.display = 'none';
        }

        // ==================== تحديث الإحصائيات ====================
        function updateStats() {
            document.getElementById('totalPhotos').textContent = allPhotos.length;
            document.getElementById('totalFolders').textContent = folders.size;
            
            const totalBytes = allPhotos.reduce((sum, p) => sum + p.size, 0);
            document.getElementById('totalSize').textContent = (totalBytes / (1024 * 1024)).toFixed(1);
        }

        // ==================== تحديث قائمة المجلدات ====================
        function updateFolders() {
            const bar = document.getElementById('foldersBar');
            bar.innerHTML = '<span class="folder-tag" onclick="showAllPhotos()">📁 الكل</span>';
            
            Array.from(folders).sort().forEach(folder => {
                const tag = document.createElement('span');
                tag.className = 'folder-tag';
                tag.textContent = `📁 ${folder}`;
                tag.onclick = () => filterByFolder(folder);
                bar.appendChild(tag);
            });
        }

        // ==================== عرض الصور ====================
        function displayPhotos(photos) {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            
            photos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.onclick = () => openModal(index);
                
                const sizeKB = (photo.size / 1024).toFixed(0);
                const date = new Date(photo.lastModified).toLocaleDateString();
                
                card.innerHTML = `
                    <img src="${photo.url}" alt="${photo.name}" loading="lazy">
                    <div class="photo-info">
                        <div class="photo-name">${photo.name}</div>
                        <div class="photo-meta">
                            <span>${sizeKB} KB</span>
                            <span>${date}</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // ==================== وظائف العرض ====================
        function showAllPhotos() {
            currentPhotos = [...allPhotos];
            displayPhotos(currentPhotos);
        }

        function filterByFolder(folder) {
            currentPhotos = allPhotos.filter(p => p.folder === folder);
            displayPhotos(currentPhotos);
        }

        function sortByDate() {
            currentPhotos.sort((a, b) => b.lastModified - a.lastModified);
            displayPhotos(currentPhotos);
        }

        function sortByName() {
            currentPhotos.sort((a, b) => a.name.localeCompare(b.name));
            displayPhotos(currentPhotos);
        }

        function sortBySize() {
            currentPhotos.sort((a, b) => b.size - a.size);
            displayPhotos(currentPhotos);
        }

        async function rescan() {
            await scanAllPhotos();
        }

        // ==================== نافذة العرض ====================
        function openModal(index) {
            currentIndex = index;
            document.getElementById('modalImage').src = currentPhotos[currentIndex].url;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function prevImage() {
            if (currentIndex > 0) {
                currentIndex--;
                document.getElementById('modalImage').src = currentPhotos[currentIndex].url;
            }
        }

        function nextImage() {
            if (currentIndex < currentPhotos.length - 1) {
                currentIndex++;
                document.getElementById('modalImage').src = currentPhotos[currentIndex].url;
            }
        }

        // ==================== تنظيف الذاكرة عند الإغلاق ====================
        window.addEventListener('beforeunload', function() {
            allPhotos.forEach(photo => {
                if (photo.url) URL.revokeObjectURL(photo.url);
            });
        });

        // ==================== التحكم بلوحة المفاتيح ====================
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('imageModal');
            if (modal.style.display === 'flex') {
                if (e.key === 'ArrowLeft') prevImage();
                else if (e.key === 'ArrowRight') nextImage();
                else if (e.key === 'Escape') closeModal();
            }
        });

    </script>
</body>
</html>
